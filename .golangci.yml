# golangci-lint configuration (v1 schema; pin the linter version in CI).
run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - errorlint
    - bodyclose
    - gofmt
    - goimports
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused

linters-settings:
  goimports:
    local-prefixes: github.com/Norrodar/TidyDAV
  govet:
    enable:
      - shadow
  misspell:
    locale: US

issues:
  exclude-rules:
    # Test files may ignore errors for brevity in setup/teardown.
    - path: _test\.go
      linters:
        - errcheck
        - bodyclose
  max-issues-per-linter: 0
  max-same-issues: 0
